name: Update Numbers4 data

on:
  schedule:
    # 平日 20:30 JST (= 11:30 UTC)
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (headless Chromium)
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch latest results
        run: python scripts/fetch_n4.py

      - name: Commit & push if changed
        run: |
          git config user.name "n4quant-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "data: update Numbers4 results ($(date -u +%Y-%m-%d))"
            git push
          fi
